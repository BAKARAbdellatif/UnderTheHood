<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp - Modifier la tâche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="d-flex align-items-center mb-4">
                    <a href="index.html" class="btn btn-outline-secondary btn-sm me-3">&larr; Retour</a>
                    <div>
                        <h1 class="h3 text-dark fw-bold mb-0">Modifier la tâche <span class="text-primary">#1024</span>
                        </h1>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <form action="index.html" method="GET">
                            <div class="row g-4">

                                <div class="col-12">
                                    <label for="titre" class="form-label small fw-semibold text-secondary">Titre de la
                                        tâche</label>
                                    <input type="text" class="form-control" id="titre" value="Migration Serveur Web"
                                        required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="status"
                                        class="form-label small fw-semibold text-secondary">Statut</label>
                                    <select class="form-select" id="status" required>
                                        <option value="A faire">À faire</option>
                                        <option value="En cours" selected>En cours</option>
                                        <option value="Termine">Terminé</option>
                                        <option value="Bloque">Bloqué</option>
                                    </select>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="technicien"
                                        class="form-label small fw-semibold text-secondary">Technicien assigné
                                        (ID)</label>
                                    <select class="form-select" id="technicien" required>
                                        <option value="101" selected>101 - Support N2</option>
                                        <option value="102">102 - SysAdmin Core</option>
                                        <option value="103">103 - Expert BDD</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label for="demandeur"
                                        class="form-label small fw-semibold text-secondary">Demandeur</label>
                                    <input type="text" class="form-control" id="demandeur" value="Service Infra"
                                        required>
                                </div>

                                <div class="col-12">
                                    <label for="description"
                                        class="form-label small fw-semibold text-secondary">Description du
                                        besoin</label>
                                    <textarea class="form-control" id="description"
                                        rows="4">Mettre à jour l'infrastructure vers le dernier cluster d'OS.</textarea>
                                </div>

                                <div class="col-12 text-end mt-5 border-top pt-4">
                                    <a href="index.html" class="btn btn-light me-2 px-4">Annuler</a>
                                    <button type="submit" class="btn btn-success px-4">Mettre à jour</button>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
