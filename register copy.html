<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm border-0 my-5">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 text-primary fw-bold">Créer un compte</h1>
                            <p class="text-muted small">Rejoignez l'application de gestion de tâches</p>
                        </div>
                        
                        <form action="login.html" method="GET">
                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <label for="nom" class="form-label small fw-semibold text-secondary">Nom</label>
                                    <input type="text" class="form-control" id="nom" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="prenom" class="form-label small fw-semibold text-secondary">Prénom</label>
                                    <input type="text" class="form-control" id="prenom" required>
                                </div>
                                <div class="col-12">
                                    <label for="pseudo" class="form-label small fw-semibold text-secondary">Pseudo</label>
                                    <input type="text" class="form-control" id="pseudo" required>
                                </div>
                                <div class="col-12">
                                    <label for="email" class="form-label small fw-semibold text-secondary">Adresse Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="password" class="form-label small fw-semibold text-secondary">Mot de passe</label>
                                    <input type="password" class="form-control" id="password" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="password_confirm" class="form-label small fw-semibold text-secondary">Confirmation</label>
                                    <input type="password" class="form-control" id="password_confirm" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100 py-2">S'inscrire</button>
                                </div>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Déjà inscrit ? <a href="login.html" class="text-decoration-none fw-semibold">Connectez-vous</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
