<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="h3 text-primary fw-bold">Connexion</h2>
                            <p class="text-muted small">Accédez à votre espace de travail</p>
                        </div>

                        <form action="index.html" method="GET">
                            <div class="mb-3">
                                <label for="pseudo" class="form-label small fw-semibold text-secondary">Pseudo</label>
                                <input type="text" class="form-control" id="pseudo" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-semibold text-secondary">Mot de
                                    passe</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Se connecter</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Pas encore de compte ? <a href="register.html"
                                    class="text-decoration-none fw-semibold">Créer un compte</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
